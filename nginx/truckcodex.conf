# /etc/nginx/sites-available/truckcodex
#
# TruckCodex — nginx reverse proxy for the Flask app.
# Certbot will extend this file with SSL directives when you run:
#   sudo certbot --nginx -d truckcodex.com.au -d www.truckcodex.com.au

server {
    listen 80;
    server_name truckcodex.com.au www.truckcodex.com.au;

    # Allow larger request bodies (route geometry payloads can be a few KB)
    client_max_body_size 1M;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }
}
