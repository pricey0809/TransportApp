app = "transportapp-pricey"
primary_region = "syd"

[build]

[env]
  FLASK_DEBUG = "false"
  NHVR_API_BASE_URL = "https://api-public.nhvr.gov.au"
  VALHALLA_URL = "https://valhalla.openstreetmap.de"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
